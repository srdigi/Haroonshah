  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, Helvetica, sans-serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:14px;
      color:#fff;
      background:
        linear-gradient(135deg,#0a1028,#111936,#1a1240);
    }

    .container{
      width:100%;
      max-width:390px;
      text-align:center;
      padding:22px 16px;
      border-radius:22px;
      background:rgba(20,25,50,0.92);
      border:1px solid rgba(120,150,255,0.18);
      box-shadow:0 10px 30px rgba(0,0,0,0.35);
    }

    .logo{
      width:92px;
      height:92px;
      margin:0 auto 12px;
      border-radius:50%;
      background:linear-gradient(135deg,#5f8fff,#7c4dff);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:28px;
      box-shadow:0 0 18px rgba(120,150,255,0.28);
    }

    .badges{
      display:flex;
      justify-content:center;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    .badge{
      padding:7px 11px;
      border-radius:18px;
      font-size:11px;
      font-weight:700;
      background:rgba(100,150,255,0.14);
      border:1px solid rgba(120,150,255,0.22);
    }

    .title{
      font-size:30px;
      font-weight:900;
      margin:10px 0 8px;
      color:#9bb8ff;
    }

    .desc{
      font-size:12.5px;
      color:#d0d7ff;
      margin-bottom:12px;
      line-height:1.5;
    }

    .strip{
      display:inline-block;
      padding:8px 12px;
      border-radius:12px;
      background:rgba(100,150,255,0.10);
      font-size:11px;
      margin-bottom:12px;
    }

    .features{
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:8px;
      margin-bottom:14px;
    }

    .feature{
      font-size:11px;
      padding:6px 10px;
      border-radius:10px;
      background:rgba(255,255,255,0.06);
    }

    .stats{
      display:flex;
      justify-content:space-between;
      gap:8px;
      margin-bottom:14px;
    }

    .stat{
      flex:1;
      background:rgba(255,255,255,0.04);
      border-radius:12px;
      padding:10px 6px;
    }

    .stat h3{
      color:#7ea2ff;
      font-size:17px;
      margin-bottom:4px;
    }

    .stat p{
      font-size:11px;
      color:#d0d7ff;
    }

    .btn{
      display:block;
      text-decoration:none;
      padding:14px;
      border-radius:14px;
      font-weight:800;
      margin-bottom:10px;
      transition:transform .2s ease;
    }

    .btn:active{
      transform:scale(0.98);
    }

    .primary{
      background:linear-gradient(90deg,#6a8cff,#7c4dff);
      color:#fff;
      box-shadow:0 0 14px rgba(120,150,255,0.28);
    }

    .secondary{
      background:rgba(255,255,255,0.08);
      color:#fff;
    }

    @media (max-width:420px){
      .title{
        font-size:28px;
      }
    }
  </style>

      <div class="feature">🔥 IPL</div>
    </div>

    <div class="stats">

      <div class="stat"><h3>IPL</h3><p>Focus</p></div>
      <div class="stat"><h3>FREE</h3><p>Join</p></div>
    </div>
