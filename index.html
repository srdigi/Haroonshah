<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haroon Shah</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Inter',sans-serif;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
color:#fff;
background:
linear-gradient(rgba(5,10,30,0.8),rgba(5,5,20,0.95)),
url('https://images.unsplash.com/photo-1599058917765-a780eda07a3e?auto=format&fit=crop&w=1200&q=80') center/cover no-repeat;
}

/* glass card */
.container{
width:92%;
max-width:410px;
text-align:center;
padding:22px 18px;
border-radius:24px;
background:rgba(20,25,50,0.5);
backdrop-filter:blur(14px);
border:1px solid rgba(100,150,255,0.2);
box-shadow:0 0 40px rgba(80,120,255,0.2);
}

/* logo */
.logo{
width:105px;
height:105px;
margin:0 auto 12px;
border-radius:50%;
background:linear-gradient(135deg,#5f8fff,#7c4dff);
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
box-shadow:0 0 25px rgba(120,150,255,0.4);
}

/* badges */
.badges{
display:flex;
justify-content:center;
gap:8px;
flex-wrap:wrap;
margin-bottom:10px;
}

.badge{
padding:7px 12px;
border-radius:20px;
font-size:11px;
font-weight:800;
background:rgba(100,150,255,0.15);
border:1px solid rgba(120,150,255,0.3);
}

/* title */
.title{
font-size:32px;
font-weight:900;
margin:10px 0;
background:linear-gradient(180deg,#9bb8ff,#6a8cff,#7c4dff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* desc */
.desc{
font-size:12.5px;
color:#d0d7ff;
margin-bottom:12px;
}

/* strip */
.strip{
display:inline-block;
padding:8px 12px;
border-radius:14px;
background:rgba(100,150,255,0.1);
font-size:11px;
margin-bottom:12px;
}

/* features */
.features{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:8px;
margin-bottom:12px;
}

.feature{
font-size:11px;
padding:6px 10px;
border-radius:10px;
background:rgba(255,255,255,0.06);
}

/* stats */
.stats{
display:flex;
justify-content:space-around;
font-size:12px;
margin-bottom:14px;
}

.stat{
text-align:center;
}

.stat h3{
color:#7ea2ff;
font-size:18px;
}

/* buttons */
.btn{
display:block;
text-decoration:none;
padding:14px;
border-radius:14px;
font-weight:900;
margin-bottom:10px;
transition:.25s;
}

.primary{
background:linear-gradient(90deg,#6a8cff,#7c4dff);
color:#fff;
box-shadow:0 0 20px rgba(120,150,255,0.4);
animation:pulse 2s infinite;
}

.secondary{
background:rgba(255,255,255,0.08);
color:#fff;
}

@keyframes pulse{
0%{box-shadow:0 0 0 0 rgba(120,150,255,0.4);}
70%{box-shadow:0 0 0 12px rgba(120,150,255,0);}
100%{box-shadow:0 0 0 0 rgba(120,150,255,0);}
}
</style>
</head>

<body>

<div class="container">

<div class="logo">🔥</div>

<div class="badges">
<div class="badge">Official</div>
<div class="badge">107,125 Subscribers</div>
</div>

<h1 class="title">Haroon Shah</h1>

<p class="desc">
IPL Tips • Match Predictions • Live Cricket Updates
</p>

<div class="strip">🏏 IPL • Cricket • Premium</div>

<div class="features">
<div class="feature">🏏 Tips</div>
<div class="feature">⚡ Live</div>
<div class="feature">🔥 IPL</div>
</div>

<div class="stats">
<div class="stat"><h3>107K+</h3><p>Subs</p></div>
<div class="stat"><h3>IPL</h3><p>Focus</p></div>
<div class="stat"><h3>FREE</h3><p>Join</p></div>
</div>

<a href="https://t.me/+U6_zTTTJgc5iNGE9" class="btn primary">
Join Channel — Free
</a>

<a href="https://t.me/+U6_zTTTJgc5iNGE9" class="btn secondary">
Start Now
</a>

</div>

</body>
</html>
